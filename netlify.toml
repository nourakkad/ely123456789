[build]
  command = "npm run build"
  publish = "build"

[functions]
  directory = "netlify/functions"

# Optional `/api/send-mail` alias (`public/_redirects` also defines it for the publish bundle)
[[redirects]]
  from = "/api/send-mail"
  to = "/.netlify/functions/send-mail"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
